name: Build Android APKs

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
      - 'Android-App/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-admin:
    name: Build Admin App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install SDK Platform 34
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      # === إنشاء المفتاح الدائم ===
      - name: Create Permanent Keystore
        run: |
          KEYSTORE_FILE=abuzahra-admin-key.jks
          if [ ! -f "$KEYSTORE_FILE" ]; then
             echo "Generating NEW permanent keystore..."
             keytool -genkey -v -keystore $KEYSTORE_FILE -alias abuzahra -keyalg RSA -keysize 2048 -validity 10000 -storepass abuzahra123 -keypass abuzahra123 -dname "CN=AbuZahraAdmin, OU=Dev, O=AbuZahra, L=Riyadh, ST=SA, C=SA"
          else
             echo "Using EXISTING permanent keystore."
          fi

      - name: Build Admin App (Debug)
        working-directory: Admin-App
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      # === التوقيع باستخدام apksigner ===
      - name: Sign Admin APK with apksigner
        run: |
          APK_SIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          UNSIGNED_APK=Admin-App/app/build/outputs/apk/debug/app-debug.apk
          SIGNED_APK=Admin-App/app/build/outputs/apk/debug/app-signed.apk

          echo "Using apksigner at: $APK_SIGNER"

          $APK_SIGNER sign --ks abuzahra-admin-key.jks --ks-key-alias abuzahra --ks-pass pass:abuzahra123 --key-pass pass:abuzahra123 --out $SIGNED_APK $UNSIGNED_APK

          mv $SIGNED_APK $UNSIGNED_APK

      # === طباعة SHA-1 ===
      - name: Extract Admin SHA-1 Key
        run: |
          echo "============================================================"
          echo "               FIREBASE SHA-1 KEY (ADMIN)"
          echo "============================================================"
          keytool -list -v -keystore abuzahra-admin-key.jks -alias abuzahra -storepass abuzahra123 | grep "SHA1:"
          echo "============================================================"

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-APK
          path: Admin-App/app/build/outputs/apk/debug/app-debug.apk

  build-manager:
    name: Build Manager App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Manager App (Debug)
        working-directory: Android-App
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: Android-App/app/build/outputs/apk/debug/*.apk

  release:
    name: Create GitHub Release
    needs: [build-admin, build-manager]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename APKs
        run: |
          mv Admin-App-APK/*.apk AbuZahra-Admin-v2.0.0.apk 2>/dev/null || true
          mv Android-App-APK/*.apk AbuZahra-Manager-v3.5.0.apk 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-${{ github.run_number }}
          name: "Abu-Zahra v2.0.0 Build #${{ github.run_number }}"
          body: |
            ## Abu-Zahra Admin & Manager Apps
            
            ### Admin App v2.0.0:
            - Firebase Auth (Google Sign-In + Email/Password + Create Account)
            - All 8 command categories (116 commands)
            - Live Streaming (Screen/Camera/Audio)
            - Data Viewer (12 data types)
            - Monitoring (Keylogger, Screen/Audio Record, Camera, Location)
            - User Management
            - Command Parameter Dialogs (32 commands)
            - Permanent Link Code per email
            
            ### Manager App v3.5.0:
            - Updated Firebase configuration
          
            ### SHA1 Fingerprint (Admin App):
            Check the build-admin job logs for the SHA-1 key.
            Add it to Firebase Console → Project Settings → Your Apps → Admin-App → Add SHA1
          files: |
            AbuZahra-Admin-v2.0.0.apk
            AbuZahra-Manager-v3.5.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}