name: Build Admin-App

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
  pull_request:
    branches: [main]
    paths:
      - 'Admin-App/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Admin-App APK
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK Licenses
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true

    - name: Install SDK Platform 34
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"

    # === 1. إنشاء المفتاح الدائم ===
    - name: Create Permanent Keystore
      run: |
        KEYSTORE_FILE=abuzahra-admin-key.jks
        if [ ! -f "$KEYSTORE_FILE" ]; then
           echo "Generating NEW permanent keystore..."
           keytool -genkey -v -keystore $KEYSTORE_FILE -alias abuzahra -keyalg RSA -keysize 2048 -validity 10000 -storepass abuzahra123 -keypass abuzahra123 -dname "CN=AbuZahraAdmin, OU=Dev, O=AbuZahra, L=Riyadh, ST=SA, C=SA"
        else
           echo "Using EXISTING permanent keystore."
        fi

    # === 2. الإعداد والبناء ===
    - name: Validate Configs
      working-directory: Admin-App
      run: |
        if [ ! -f settings.gradle ]; then
          echo "rootProject.name = 'AbuAlZahra-Admin'" > settings.gradle
          echo "include ':app'" >> settings.gradle
        fi
        if [ ! -f gradle.properties ]; then
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x Admin-App/gradlew

    - name: Build Debug APK
      working-directory: Admin-App
      run: ./gradlew :app:assembleDebug --no-daemon

    # === 3. التوقيع باستخدام الأداة الحديثة (apksigner) ===
    - name: Sign APK with apksigner (Modern Method)
      run: |
        APK_SIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
        UNSIGNED_APK=Admin-App/app/build/outputs/apk/debug/app-debug.apk
        SIGNED_APK=Admin-App/app/build/outputs/apk/debug/app-signed.apk

        echo "Using apksigner at: $APK_SIGNER"

        $APK_SIGNER sign --ks abuzahra-admin-key.jks --ks-key-alias abuzahra --ks-pass pass:abuzahra123 --key-pass pass:abuzahra123 --out $SIGNED_APK $UNSIGNED_APK

        # استبدال الملف الأصلي بالموقع للرفع
        mv $SIGNED_APK $UNSIGNED_APK

    # === 4. طباعة المفتاح ===
    - name: Extract SHA-1 Key
      run: |
        echo "============================================================"
        echo "               FIREBASE SHA-1 KEY (ADMIN)"
        echo "============================================================"
        keytool -list -v -keystore abuzahra-admin-key.jks -alias abuzahra -storepass abuzahra123 | grep "SHA1:"
        echo "============================================================"
        echo "⚠️  أضف هذا المفتاح إلى Firebase Console:"
        echo "    Firebase Console → Project Settings → Your Apps → Admin-App → Add SHA1"
        echo "============================================================"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Admin-App-Debug
        path: Admin-App/app/build/outputs/apk/debug/app-debug.apk