name: Build Admin-App

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
  pull_request:
    branches: [main]
    paths:
      - 'Admin-App/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Admin-App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Admin-App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-admin-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-admin-

      - name: Print SHA1 Fingerprint
        run: |
          echo "============================================================"
          echo "               FIREBASE SHA-1 KEY (Admin-App)"
          echo "============================================================"
          keytool -list -v -keystore release.keystore -alias abuzahra -storepass abuzahra2024 | grep "SHA1:"
          echo "============================================================"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-Debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-Release
          path: app/build/outputs/apk/release/*.apk
