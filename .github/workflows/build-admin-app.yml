name: Build Admin-App

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
  pull_request:
    branches: [main]
    paths:
      - 'Admin-App/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Admin-App APK
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK Licenses
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true

    - name: Install SDK Platform 34
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"

    # === 1. طباعة مفتاح SHA-1 من ملف التوقيع الثابت ===
    - name: Print SHA-1 from Permanent Keystore
      run: |
        echo "============================================================"
        echo "          FIREBASE SHA-1 (from release.keystore)"
        echo "============================================================"
        keytool -list -v -keystore Admin-App/release.keystore -alias abuzahra -storepass abuzahra2024 | grep "SHA1:"
        echo "============================================================"
        echo "  أضف هذا المفتاح إلى Firebase Console:"
        echo "  Settings → Your Apps → Admin-App → Add SHA-1"
        echo "============================================================"

    # === 2. الإعداد ===
    - name: Validate Configs
      working-directory: Admin-App
      run: |
        if [ ! -f settings.gradle ]; then
          echo "rootProject.name = 'AbuAlZahra-Admin'" > settings.gradle
          echo "include ':app'" >> settings.gradle
        fi
        if [ ! -f gradle.properties ]; then
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x Admin-App/gradlew

    # === 3. بناء Release APK (يستخدم release.keystore تلقائياً من build.gradle) ===
    - name: Build Release APK
      working-directory: Admin-App
      run: ./gradlew :app:assembleRelease --no-daemon

    # === 4. رفع الـ APK ===
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Admin-App-Release
        path: Admin-App/app/build/outputs/apk/release/app-release.apk

    # === 5. إنشاء Release على GitHub (using PAT) ===
    - name: Get Version
      id: version
      run: |
        VERSION=$(grep "versionName" Admin-App/app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "APK version: $VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.version }}"
        name: "AbuZahra Admin v${{ steps.version.outputs.version }}"
        files: Admin-App/app/build/outputs/apk/release/app-release.apk
        overwrite_files: true
        body: |
          ## AbuZahra Admin App v${{ steps.version.outputs.version }}

          ### التغييرات:
          - إصلاح تسجيل الدخول عبر جوجل
          - كود ربط دائم لكل حساب
          - عدم تحميل الأوامر السابقة عند تسجيل الدخول
          - تصفح الملفات بشكل متزامن (بدون انتظار)
          - مهلة 20 ثانية للأوامر
          - تحسين نظام البث عبر السيرفر
          - إشارات WebRTC للبث المباشر
          - تحسينات الأداء والإستقرار

          **ملاحظة**: تأكد من إضافة مفتاح SHA-1 إلى Firebase Console:
          `0A:27:6F:32:73:15:92:AF:77:06:03:F8:4C:81:48:00:45:75:F4:D4`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true