name: Build Admin-App

on:
  push:
    branches: [main]
    paths:
      - 'Admin-App/**'
  pull_request:
    branches: [main]
    paths:
      - 'Admin-App/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Admin-App APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-admin-${{ hashFiles('Admin-App/**/build.gradle', 'Admin-App/**/gradle-wrapper.properties') }}
          restore-keys: gradle-admin-

      - name: Print SHA1 Fingerprint
        run: |
          echo "========================================="
          echo "🔑 Admin-App SHA1 Fingerprint:"
          echo "========================================="
          keytool -list -v -keystore Admin-App/release.keystore -storepass abuzahra2024 -alias abuzahra 2>&1 | grep SHA1
          echo "========================================="
          echo "⚠️  If Google Sign-In fails with error 10 or 12500,"
          echo "    add this SHA1 to Firebase Console:"
          echo "    Firebase Console → Project Settings → Your Apps → Admin-App → Add SHA1"
          echo "========================================="

      - name: Grant execute permission for gradlew
        run: chmod +x Admin-App/gradlew

      - name: Build Debug APK
        working-directory: Admin-App
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: Build Release APK
        working-directory: Admin-App
        run: ./gradlew assembleRelease --stacktrace 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-Debug
          path: Admin-App/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-Release
          path: Admin-App/app/build/outputs/apk/release/*.apk